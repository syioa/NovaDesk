<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaDesk</title>
    <script type="module" src="/src/main.js" defer></script>
</head>

<body>
    <div id="desktop">
        <div id="snapPreview"></div>
        <div class="desktop-icons" id="icons">

        </div>

        <div class="menu" id="menu">
            <button class="notes">
                <img class="icon" src="/icons/notes.svg"> Notes
            </button>

            <button class="settings">
                ⚙️ Settings
            </button>
        </div>

        <div id="contextMenu" class="context-menu">

            <button id="ctxRefresh">
                <span>↻</span>
                <span>Refresh</span>
            </button>

            <button id="ctxNotes">
                <span>📝</span>
                <span>New Note</span>
            </button>

            <button id="ctxSettings">
                <span>⚙️</span>
                <span>Settings</span>
            </button>

            <button id="ctxWallpaper">
                <span>🖼</span>
                <span>Reset Wallpaper</span>
            </button>

        </div>
    </div>

    <div class="taskbar">

        <button id="start"></button>

        <div id="taskbarApps" class="taskbar-apps">
        </div>

        <div class="clock" id="clock">
        </div>

    </div>

</body>

</html>
